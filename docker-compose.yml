services:

  # ─── Base de Datos (PostgreSQL) ───────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: nfcproject_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-nfcproject_dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-nfcproject_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-nfcproject_dev} -d ${DB_NAME:-nfcproject_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Caché (Redis) ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nfcproject_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Panel visual de PostgreSQL (pgAdmin) ─────────────────────────────────
  # Abrir en: http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nfcproject_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@friocheck.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
    ports:
      - '5050:80'
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
